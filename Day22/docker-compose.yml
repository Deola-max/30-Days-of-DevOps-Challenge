version: '3.8'

services:
  db:
    image: postgres:15
    restart: always
    environment:
      POSTGRES_USER: favour_admin
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: devops_db
    volumes:
      - postgres_data:/var/lib/postgresql/data

  admin-panel:
    image: adminer:latest
    restart: always
    ports:
      - 8080:8080

volumes:
  postgres_data: